x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
services:
  metube:
    image: ghcr.io/alexta69/metube:2026.07.05
    container_name: metube
    restart: unless-stopped
    logging: *default-logging
    user: "0:10000"
    ports:
      - "8081:8081"
    volumes:
      - ${SMBSHARE_FOLDER}:/downloads
      - metube_state:/downloads/.metube        # ← State auf lokalem Volume
    environment:
      - DOWNLOAD_DIR=/downloads
      - STATE_DIR=/downloads/.metube
      - YTDL_OPTIONS={"format":"bestvideo+bestaudio/best","merge_output_format":"mp4","no_overwrites":true,"writesubtitles":true,"writethumbnail":true,"embedmetadata":true}
      - OUTPUT_TEMPLATE=%(uploader)s/%(title)s.%(ext)s
      - RESTRICT_FILENAMES=true
      - TZ=Europe/Berlin
      - DELETE_FILE_ON_TRASHCAN=true

volumes:
  metube_state: