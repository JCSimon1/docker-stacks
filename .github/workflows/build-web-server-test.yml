name: Build and Publish web-server-test

on:
  push:
    branches:
      - main
    paths:
      - 'web-server-test/**'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Create .env file
          run: |
            cp .env.example .env
            echo "PORT_EXTERNAL=${{ secrets.PORT_EXTERNAL }}" >> .env
            echo "SOURCE_LOCATION=${{ secrets.SOURCE_LOCATION }}" >> .env

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./web-server-test
          file: ./web-server-test/Dockerfile
          push: true
          tags: ghcr.io/jcsimon1/web-server-test:latest