name: Build and Publish web-server-test

on:
push:
branches:
- main
paths:
- 'web-server-test/**'
- '.github/workflows/build-web-server-test.yml'

permissions:
contents: read
packages: write

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Login to GHCR
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}

  - name: Extract metadata
    id: meta
    uses: docker/metadata-action@v5
    with:
      images: ghcr.io/${{ github.repository_owner }}/web-server-test

  - name: Set up Buildx
    uses: docker/setup-buildx-action@v3

  - name: Build and Push
    uses: docker/build-push-action@v6
    with:
      context: ./web-server-test
      file: ./web-server-test/Dockerfile
      push: true
      tags: |
        ghcr.io/${{ github.repository_owner }}/web-server-test:latest
      labels: ${{ steps.meta.outputs.labels }}
```
